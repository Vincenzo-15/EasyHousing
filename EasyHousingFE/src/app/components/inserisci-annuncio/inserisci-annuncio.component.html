<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="bg-primary p-4 text-white text-center">
          <h2 class="fw-bold mb-0"><i class="bi bi-house-add-fill me-2"></i> Pubblica Annuncio</h2>
          <p class="mb-0 opacity-75">Compila i dettagli del tuo immobile</p>
        </div>

        <div class="card-body p-5">
          <form (ngSubmit)="onSubmit()">

            <div class="mb-4">
              <label class="form-label fw-bold text-muted small text-uppercase">Titolo Annuncio</label>
              <input type="text" [(ngModel)]="nuovoImmobile.nome" name="nome" class="form-control form-control-lg bg-light border-0" placeholder="Es. Villa panoramica" required>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold text-muted small text-uppercase">Tipologia</label>
                <select [(ngModel)]="nuovoImmobile.tipoImmobile" name="tipoImmobile" class="form-select form-select-lg bg-light border-0">
                  <option value="Appartamento">Appartamento</option>
                  <option value="Villa">Villa</option>
                  <option value="Loft">Loft</option>
                  <option value="Ufficio">Ufficio</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold text-muted small text-uppercase">Contratto</label>
                <select [(ngModel)]="nuovoImmobile.tipoAnnuncio" name="tipoAnnuncio" class="form-select form-select-lg bg-light border-0">
                  <option value="VENDITA">Vendita</option>
                  <option value="AFFITTO">Affitto</option>
                  <option value="ASTA">Asta</option>
                </select>
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <label class="form-label fw-bold text-muted small text-uppercase">Prezzo (€)</label>
                <input type="number" [(ngModel)]="nuovoImmobile.prezzoOrig" name="prezzo" class="form-control form-control-lg bg-light border-0" placeholder="0.00" required>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-bold text-muted small text-uppercase">Metri Quadri</label>
                <input type="number" [(ngModel)]="nuovoImmobile.metriQuadri" name="mq" class="form-control form-control-lg bg-light border-0" placeholder="100" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-muted small text-uppercase">Indirizzo</label>
              <input type="text" [(ngModel)]="nuovoImmobile.indirizzo" name="indirizzo" class="form-control form-control-lg bg-light border-0" required>
            </div>

            <div class="mb-4 p-4 bg-light rounded-3 border-dashed">
              <label class="form-label fw-bold text-muted small text-uppercase mb-3">
                <i class="bi bi-images me-2"></i> Foto dell'Immobile
              </label>

              <div class="input-group mb-3">
                <input type="file"
                       class="form-control form-control-lg"
                       id="inputFoto"
                       (change)="onFileSelected($event)"
                       multiple
                       accept="image/*">
              </div>

              <div class="form-text text-muted mb-3">
                Puoi selezionare più immagini contemporaneamente (JPG, PNG).
              </div>

              <div *ngIf="filesSelezionati.length > 0">
                <h6 class="fw-bold text-primary small text-uppercase">File pronti per l'upload:</h6>
                <ul class="list-group shadow-sm">
                  <li class="list-group-item d-flex justify-content-between align-items-center"
                      *ngFor="let file of filesSelezionati; let i = index">

                    <div class="d-flex align-items-center">
                      <i class="bi bi-file-earmark-image text-secondary me-3 fs-5"></i>
                      <div>
                        <span class="fw-bold text-dark">{{ file.name }}</span>
                        <br>
                        <small class="text-muted">{{ (file.size / 1024 / 1024).toFixed(2) }} MB</small>
                      </div>
                    </div>

                    <button type="button" class="btn btn-outline-danger btn-sm border-0" (click)="rimuoviFile(i)">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </li>
                </ul>
              </div>
            </div>

            <div class="mb-5">
              <label class="form-label fw-bold text-muted small text-uppercase">Descrizione</label>
              <textarea [(ngModel)]="nuovoImmobile.descrizione" name="descrizione" rows="4" class="form-control bg-light border-0"></textarea>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold shadow-sm rounded-3">PUBBLICA ANNUNCIO</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
