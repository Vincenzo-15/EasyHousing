<nav class="navbar navbar-expand-lg bg-white shadow-sm py-3 sticky-top">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center fw-bold text-dark fs-4" routerLink="/home">
      <i class="bi bi-house-door-fill text-primary me-2 fs-2"></i>
      Easy Housing
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-medium">
        <li class="nav-item px-2">
          <a class="nav-link" routerLink="/home" routerLinkActive="active">Home</a>
        </li>
        <li class="nav-item px-2">
          <a class="nav-link" (click)="goToAbout()" style="cursor: pointer;">About Us</a>
        </li>

        <li class="nav-item px-2" *ngIf="authService.isVenditore()">
          <a class="nav-link text-primary fw-bold" routerLink="/inserisci-annuncio">
            <i class="bi bi-plus-circle me-1"></i> Inserisci Annuncio
          </a>
        </li>

        <li class="nav-item px-2" *ngIf="authService.isAdmin()">
          <a class="nav-link text-danger fw-bold" routerLink="/dashboard-admin">
            <i class="bi bi-shield-lock-fill me-1"></i> Pannello Admin
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">

        <a *ngIf="authService.isLoggedIn()" routerLink="/lista-preferiti" class="btn btn-outline-danger rounded-circle d-flex align-items-center justify-content-center position-relative" title="I miei preferiti">
          <i class="bi bi-heart-fill"></i>
          <span *ngIf="numeroPreferiti > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65rem;">
            {{ numeroPreferiti }}
          </span>
        </a>

        <div class="dropdown" *ngIf="authService.isLoggedIn()">
          <button class="user-profile-toggle dropdown-toggle d-flex align-items-center"
                  type="button"
                  id="userDropdown"
                  data-bs-toggle="dropdown"
                  aria-expanded="false">

            <span class="user-avatar me-2 d-flex align-items-center justify-content-center">
              {{ authService.getUserName().charAt(0).toUpperCase() }}
            </span>

            <span class="user-name d-none d-md-inline">{{ authService.getUserName() }}</span>
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="userDropdown">
            <li><h6 class="dropdown-header">Ciao, {{ authService.getUserName() }}!</h6></li>

            <li>
              <a class="dropdown-item" routerLink="/profilo">
                <i class="bi bi-person me-2"></i>Il mio profilo
              </a>
            </li>

            <li *ngIf="authService.isVenditore()">
              <a class="dropdown-item" routerLink="/dashboard-venditore">
                <i class="bi bi-house me-2"></i>I miei annunci
              </a>
            </li>

            <li *ngIf="authService.isAdmin()">
              <a class="dropdown-item text-danger fw-bold" routerLink="/dashboard-admin">
                <i class="bi bi-shield-lock me-2"></i>Pannello Admin
              </a>
            </li>

            <li><hr class="dropdown-divider"></li>

            <li>
              <button class="dropdown-item text-danger fw-bold" (click)="doLogout()">
                <i class="bi bi-box-arrow-right me-2"></i>Esci
              </button>
            </li>
          </ul>
        </div>

        <div *ngIf="!authService.isLoggedIn()" class="d-flex gap-2">
          <a routerLink="/login" class="btn btn-outline-primary fw-bold px-4" style="border-radius: 50px;">Accedi</a>
          <a routerLink="/register" class="btn btn-primary fw-bold px-4" style="border-radius: 50px;">Registrati</a>
        </div>

      </div>
    </div>
  </div>
</nav>
