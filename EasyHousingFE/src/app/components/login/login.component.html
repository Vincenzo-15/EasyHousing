<div class="container-fluid vh-100">
  <div class="row h-100">

    <div class="col-lg-6 d-none d-lg-block p-0 position-relative">
      <img src="https://images.unsplash.com/photo-1582407947304-fd86f028f716?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80"
           class="w-100 h-100 object-fit-cover" alt="Login Background">
      <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-25"></div> <div class="position-absolute bottom-0 start-0 p-5 text-white">
      <h2 class="fw-bold">Bentornato su Easy Housing.</h2>
      <p class="lead">Trova la casa dei tuoi sogni oggi stesso.</p>
    </div>
    </div>

    <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white">
      <div class="login-box w-75" style="max-width: 450px;">

        <div class="text-center mb-5">
          <h3 class="fw-bold mb-2">Accedi al tuo Account</h3>
          <p class="text-muted">Inserisci le tue credenziali per continuare</p>
        </div>

        <form (ngSubmit)="onLogin()">

          <div class="mb-4">
            <label class="form-label fw-bold small text-uppercase text-muted">Email</label>
            <input type="email" [(ngModel)]="email" name="email" class="form-control form-control-lg bg-light border-0" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold small text-uppercase text-muted">Password</label>
            <input type="password" [(ngModel)]="password" name="password" class="form-control form-control-lg bg-light border-0" required>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label small" for="rememberMe">Ricordami</label>
            </div>
            <a href="#" class="small text-primary text-decoration-none fw-bold">Password dimenticata?</a>
          </div>

          <div class="d-grid mb-4">
            <button type="submit" class="btn btn-primary btn-lg py-3 fw-bold shadow-sm">ACCEDI</button>
          </div>

          <div class="text-center">
            <span class="text-muted small">Non hai un account? </span>
            <a routerLink="/register" class="text-primary fw-bold text-decoration-none small">Registrati ora</a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>
